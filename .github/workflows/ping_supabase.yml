name: Ping Supabase

on:
  schedule:
    # Run twice a day to keep project active (Supabase pauses after 7 days of inactivity on free tier, but good to run daily)
    - cron: '0 0,12 * * *'
  
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Ping Supabase REST API
        run: |
          echo "Pinging Supabase at ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
          curl -s -f -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
          "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/" > /dev/null
          
          if [ $? -eq 0 ]; then
            echo "✅ Successfully pinged Supabase API."
          else
            echo "❌ Failed to ping Supabase API."
            exit 1
          fi
